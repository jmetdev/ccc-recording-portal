<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">CloudCoreCollab logo</title>
  <desc id="desc">A modular cloud communications mark beside the CloudCoreCollab wordmark, optimized for light backgrounds.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EBFF7"/>
      <stop offset="1" stop-color="#1597E5"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C7D6"/>
      <stop offset="1" stop-color="#30C9B0"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#875AE0"/>
      <stop offset="1" stop-color="#643ABD"/>
    </linearGradient>
  </defs>
  <g id="mark" transform="translate(36 36)">
    <path d="M61 52H107M52 61V107M116 61V107M61 116H107" fill="none" stroke="#DDE8F2" stroke-width="18" stroke-linecap="round"/>
    <rect x="0" y="0" width="68" height="68" rx="12" fill="url(#blue)"/>
    <rect x="100" y="0" width="68" height="68" rx="12" fill="url(#mint)"/>
    <rect x="0" y="100" width="68" height="68" rx="12" fill="url(#blue)"/>
    <rect x="100" y="100" width="68" height="68" rx="12" fill="url(#mint)"/>
    <rect x="52" y="52" width="64" height="64" rx="12" fill="url(#violet)" stroke="#FFFFFF" stroke-width="8"/>
  </g>
  <text x="246" y="154" font-family="Avenir Next Condensed, Avenir Next, Futura, sans-serif" font-size="106" font-weight="500" letter-spacing="-3">
    <tspan fill="#0F0F0F">Cloud</tspan><tspan fill="#1597E5">Core</tspan><tspan fill="#643ABD">Collab</tspan>
  </text>
</svg>
