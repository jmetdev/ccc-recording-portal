services:
  db:
    image: pgvector/pgvector:pg16
    container_name: portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    volumes:
      - portal_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./portal/backend
      args:
        # On-prem compose introspects sibling containers via the mounted Docker
        # socket, so it needs the docker CLI in the image. The cloud image omits it.
        INSTALL_DOCKER_CLI: "true"
    container_name: portal-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${POSTGRES_DB:-portal}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${POSTGRES_DB:-portal}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-min-32-chars!!}
      INGEST_TOKEN: ${INGEST_TOKEN:-change-me-ingest-token}
      WORKER_TOKEN: ${WORKER_TOKEN:-change-me-worker-token}
      RECORDINGS_DIR: /recordings
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      FREESWITCH_FS_CLI: ${FREESWITCH_FS_CLI:-}
      TRANSCRIPTION_ENABLED: ${TRANSCRIPTION_ENABLED:-false}
      WHISPER_CONTAINER_NAME: ${WHISPER_CONTAINER_NAME:-portal-whisper}
      SYSTEM_CONTAINERS: ${SYSTEM_CONTAINERS:-portal-backend,portal-db,portal-frontend,portal-media-handler,freeswitch}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-ccc-portal}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_ORG_STRICT: ${OIDC_ORG_STRICT:-true}
      SUITE_API_URL: http://suite-backend:8000
      SUITE_INTERNAL_TOKEN: ${SUITE_INTERNAL_TOKEN:-change-me-suite-internal-token}
      RETENTION_SWEEP_INTERVAL_S: ${RETENTION_SWEEP_INTERVAL_S:-3600}
    volumes:
      - ${RECORDINGS_HOST_PATH:-./runtime/recordings}:/recordings:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  suite-backend:
    build:
      context: ./suite/backend
    container_name: portal-suite-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${SUITE_POSTGRES_DB:-suite}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${SUITE_POSTGRES_DB:-suite}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      SUPERADMIN_EMAILS: ${SUITE_SUPERADMIN_EMAILS:-}
      SUITE_INTERNAL_TOKEN: ${SUITE_INTERNAL_TOKEN:-change-me-suite-internal-token}
    ports:
      - "${SUITE_BACKEND_PORT:-8001}:8000"

  frontend:
    build:
      context: ./portal/frontend
    container_name: portal-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - suite-backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  media-handler:
    build:
      context: ./portal/media-handler
    container_name: portal-media-handler
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      WORKER_TOKEN: ${WORKER_TOKEN:-change-me-worker-token}
      RECORDINGS_DIR: /recordings
    volumes:
      - ${RECORDINGS_HOST_PATH:-./runtime/recordings}:/recordings:rw

  whisper:
    profiles: [whisper]
    build:
      context: ./portal/whisper
    container_name: portal-whisper
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      WORKER_TOKEN: ${WORKER_TOKEN:-change-me-worker-token}
      RECORDINGS_DIR: /recordings
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - ${RECORDINGS_HOST_PATH:-./runtime/recordings}:/recordings:ro

  keycloak:
    profiles: [sso]
    image: quay.io/keycloak/keycloak:26.0
    container_name: portal-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-portal}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8080}
    volumes:
      # Custom branded login theme (Phase D) — see keycloak/themes/ccc/.
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"

volumes:
  portal_pgdata:
