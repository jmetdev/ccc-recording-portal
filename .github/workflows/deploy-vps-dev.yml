name: Deploy VPS Dev

# Build images on GitHub-hosted runners → GHCR → deploy on self-hosted VPS runner.
# No SSH. Secrets stay in /opt/ccc-recording-portal/.env on the VPS.

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - 'suite/**'
      - 'webex-connector/**'
      - 'keycloak/**'
      - 'deploy/docker-compose.vps.yml'
      - 'deploy/vps/webhook-router/**'
      - 'deploy/vps/initdb/**'
      - 'keycloak/setup-realm-aws.sh'
      - '.github/workflows/deploy-vps-dev.yml'
  workflow_dispatch:
    inputs:
      require_public_smoke:
        description: Fail if public URLs are unreachable (post-cutover)
        type: boolean
        default: false

concurrency:
  group: vps-dev-deploy-ccc
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  APP_DIR: /opt/ccc-recording-portal
  REGISTRY: ghcr.io
  IMAGE_OWNER: jmetdev/ccc-recording-portal

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: backend
            context: ./portal/backend
            build_args: |
              INSTALL_DOCKER_CLI=true
          - image: frontend
            context: ./portal/frontend
            build_args: |
              VITE_API_URL=/api
          - image: media-handler
            context: ./portal/media-handler
            build_args: ""
          - image: keycloak
            context: ./keycloak
            build_args: ""
          - image: suite-backend
            context: ./suite/backend
            build_args: ""
          - image: webex-connector
            context: ./webex-connector
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, vps-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install compose + support files
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          mkdir -p "$APP_DIR/deploy/vps" "$APP_DIR/runtime/recordings"
          cp deploy/docker-compose.vps.yml "$APP_DIR/docker-compose.yml"
          cp -a deploy/vps/webhook-router "$APP_DIR/deploy/vps/"
          cp -a deploy/vps/initdb "$APP_DIR/deploy/vps/"
          cp keycloak/setup-realm-aws.sh "$APP_DIR/setup-realm-aws.sh"
          chmod +x "$APP_DIR/setup-realm-aws.sh"
          if [ -f deploy/vps/enable-webex-sso.sh ]; then
            cp deploy/vps/enable-webex-sso.sh "$APP_DIR/deploy/vps/enable-webex-sso.sh"
            chmod +x "$APP_DIR/deploy/vps/enable-webex-sso.sh"
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" > "$APP_DIR/.env.deploy"

      # GitHub Actions secrets → host .env (never echo values). When both IdP
      # secrets are present, also turn on portal OIDC against authdev.
      - name: Sync Webex IdP + OIDC settings
        env:
          WEBEX_IDP_CLIENT_ID: ${{ secrets.WEBEX_IDP_CLIENT_ID }}
          WEBEX_IDP_CLIENT_SECRET: ${{ secrets.WEBEX_IDP_CLIENT_SECRET }}
        run: |
          python3 - "$APP_DIR/.env" <<'PY'
          import os, sys
          from pathlib import Path

          def upsert(path: Path, key: str, value: str) -> None:
              lines = path.read_text().splitlines() if path.exists() else []
              out, found = [], False
              for line in lines:
                  if line.startswith(key + "="):
                      out.append(f"{key}={value}")
                      found = True
                  else:
                      out.append(line)
              if not found:
                  out.append(f"{key}={value}")
              path.write_text("\n".join(out) + "\n")

          env_path = Path(sys.argv[1])
          cid = os.environ.get("WEBEX_IDP_CLIENT_ID", "").strip()
          secret = os.environ.get("WEBEX_IDP_CLIENT_SECRET", "").strip()
          if not cid or not secret:
              print("WEBEX_IDP secrets missing — leaving IdP/OIDC unchanged")
              raise SystemExit(0)

          upsert(env_path, "WEBEX_IDP_CLIENT_ID", cid)
          upsert(env_path, "WEBEX_IDP_CLIENT_SECRET", secret)
          upsert(env_path, "OIDC_ENABLED", "true")
          upsert(env_path, "OIDC_ISSUER", "https://authdev.cloudcorecollab.com/realms/ccc")
          upsert(env_path, "OIDC_CLIENT_ID", "ccc-portal")
          upsert(env_path, "KEYCLOAK_HOSTNAME", "https://authdev.cloudcorecollab.com")
          print("Wrote WEBEX_IDP_* + OIDC_ENABLED=true into host .env")
          PY

          if [ -f /opt/cloudcorefax/.env ]; then
            python3 - <<'PY'
          from pathlib import Path

          def upsert(path: Path, key: str, value: str) -> None:
              lines = path.read_text().splitlines() if path.exists() else []
              out, found = [], False
              for line in lines:
                  if line.startswith(key + "="):
                      out.append(f"{key}={value}")
                      found = True
                  else:
                      out.append(line)
              if not found:
                  out.append(f"{key}={value}")
              path.write_text("\n".join(out) + "\n")

          path = Path("/opt/cloudcorefax/.env")
          upsert(path, "OIDC_ENABLED", "true")
          upsert(path, "OIDC_ISSUER", "https://authdev.cloudcorecollab.com/realms/ccc")
          upsert(path, "OIDC_CLIENT_ID", "cloudcorefax-portal")
          print("Enabled OIDC on fax .env")
          PY
          fi

      # Same upsert pattern as the Webex IdP sync above — lets these live as
      # GitHub Actions secrets instead of a manual VPS .env edit. Missing
      # SUITE_INTERNAL_TOKEN is left for the operator to notice via the
      # compose ":?set SUITE_INTERNAL_TOKEN" failure rather than silently
      # deploying without it.
      - name: Sync suite portal settings
        env:
          SUITE_INTERNAL_TOKEN: ${{ secrets.SUITE_INTERNAL_TOKEN }}
          SUITE_SUPERADMIN_EMAILS: ${{ secrets.SUITE_SUPERADMIN_EMAILS }}
        run: |
          python3 - "$APP_DIR/.env" <<'PY'
          import os, sys
          from pathlib import Path

          def upsert(path: Path, key: str, value: str) -> None:
              lines = path.read_text().splitlines() if path.exists() else []
              out, found = [], False
              for line in lines:
                  if line.startswith(key + "="):
                      out.append(f"{key}={value}")
                      found = True
                  else:
                      out.append(line)
              if not found:
                  out.append(f"{key}={value}")
              path.write_text("\n".join(out) + "\n")

          env_path = Path(sys.argv[1])
          token = os.environ.get("SUITE_INTERNAL_TOKEN", "").strip()
          emails = os.environ.get("SUITE_SUPERADMIN_EMAILS", "").strip()
          if token:
              upsert(env_path, "SUITE_INTERNAL_TOKEN", token)
              print("Wrote SUITE_INTERNAL_TOKEN into host .env")
          else:
              print("SUITE_INTERNAL_TOKEN secret missing — leaving host .env unchanged")
          if emails:
              upsert(env_path, "SUITE_SUPERADMIN_EMAILS", emails)
              print("Wrote SUITE_SUPERADMIN_EMAILS into host .env")
          PY

      - name: Pull and up app stack
        run: |
          cd "$APP_DIR"
          docker compose --env-file .env --env-file .env.deploy pull
          docker compose --env-file .env --env-file .env.deploy up -d

      - name: Bootstrap Keycloak realm
        run: |
          set -a
          # shellcheck disable=SC1091
          . "$APP_DIR/.env"
          set +a
          export KEYCLOAK_URL=http://127.0.0.1:8180
          "$APP_DIR/setup-realm-aws.sh"

      - name: On-host smoke
        run: |
          for i in $(seq 1 36); do
            code=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:8081/api/health || true)
            echo "attempt $i: /api/health -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "::error::On-host smoke failed"
          docker compose -f "$APP_DIR/docker-compose.yml" --env-file "$APP_DIR/.env" logs --tail 80 backend || true
          exit 1

      - name: On-host smoke — suite API
        run: |
          for i in $(seq 1 36); do
            code=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:8081/suite-api/health || true)
            echo "attempt $i: /suite-api/health -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "::error::Suite API smoke failed"
          docker compose -f "$APP_DIR/docker-compose.yml" --env-file "$APP_DIR/.env" logs --tail 80 suite-backend || true
          exit 1

      - name: Smoke — Keycloak (local)
        run: |
          for i in $(seq 1 12); do
            code=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:8180/realms/ccc/.well-known/openid-configuration || true)
            echo "Keycloak discovery: $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "::warning::Keycloak realm discovery not ready"

      - name: Smoke — public URLs
        env:
          REQUIRE_PUBLIC: ${{ github.event.inputs.require_public_smoke || 'false' }}
        run: |
          for url in \
            https://recorddev.cloudcorecollab.com/api/health \
            https://dev.cloudcorecollab.com/api/health \
            https://authdev.cloudcorecollab.com/realms/ccc/.well-known/openid-configuration
          do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
            echo "$url -> $code"
            if [ "$code" != "200" ]; then
              if [ "$REQUIRE_PUBLIC" = "true" ]; then
                echo "::error::Public smoke failed: $url"
                exit 1
              fi
              echo "::warning::Public smoke soft-fail (pre-cutover): $url"
            fi
          done

      - name: Prune dangling images
        if: success()
        run: docker image prune -f
