name: Deploy AWS Dev

# Builds the backend image, deploys the app stack via CDK, publishes the SPA,
# and smoke-tests https://dev.cloudcorecollab.com. Keyless auth via GitHub OIDC
# assuming the ccc-dev-github-deploy role (no long-lived AWS keys).
#
# Superseded by deploy-vps-dev.yml (162.35.179.243) — see
# deploy/vps/aws-decommission.md step 4. Demoted to manual dispatch only;
# the AWS resources themselves are still up until the rest of that checklist
# runs, so this remains available for a one-off manual deploy if ever needed.

on:
  workflow_dispatch:

concurrency:
  group: aws-dev-deploy
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: ccc-portal-backend
  WEBEX_CONNECTOR_ECR_REPO: ccc-webex-connector
  KEYCLOAK_ECR_REPO: ccc-keycloak
  STAGE: dev
  DEPLOY_ROLE: arn:aws:iam::765366202604:role/ccc-dev-github-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The CI stack owns both ECR repositories. Deploy it before attempting
      # the first push of a newly introduced image repository.
      - name: Deploy CI stack (CDK)
        working-directory: infra
        run: |
          npm ci
          npx cdk deploy ccc-dev-ci -c stage="$STAGE" --require-approval never

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          docker build \
            -t "$REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPO:dev" \
            ./portal/backend
          docker push "$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPO:dev"

      - name: Build & push hosted Webex connector image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$WEBEX_CONNECTOR_ECR_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$WEBEX_CONNECTOR_ECR_REPO:dev" \
            ./webex-connector
          docker push "$REGISTRY/$WEBEX_CONNECTOR_ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$WEBEX_CONNECTOR_ECR_REPO:dev"

      - name: Build & push Keycloak image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$KEYCLOAK_ECR_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$KEYCLOAK_ECR_REPO:dev" \
            ./keycloak
          docker push "$REGISTRY/$KEYCLOAK_ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$KEYCLOAK_ECR_REPO:dev"

      - name: Remove stuck Keycloak stack if needed
        run: |
          st=$(aws cloudformation describe-stacks --stack-name ccc-dev-keycloak --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NONE)
          if [ "$st" = "DELETE_FAILED" ] || [ "$st" = "ROLLBACK_FAILED" ]; then
            CERT=$(aws cloudformation describe-stack-resources --stack-name ccc-dev-keycloak --logical-resource-id Cert5C9FAEC1 --query 'StackResources[0].PhysicalResourceId' --output text 2>/dev/null || true)
            LARN=$(aws elbv2 describe-listeners --load-balancer-arn "$(aws elbv2 describe-load-balancers --query 'LoadBalancers[?contains(LoadBalancerName, `ccc-de-Alb`)].LoadBalancerArn' --output text | head -1)" --query 'Listeners[?Port==`443`].ListenerArn' --output text)
            if [ -n "$CERT" ] && [ "$CERT" != "None" ] && [ -n "$LARN" ]; then
              aws elbv2 remove-listener-certificates --listener-arn "$LARN" --certificates CertificateArn="$CERT" || true
              aws acm delete-certificate --certificate-arn "$CERT" || true
            fi
            aws cloudformation delete-stack --stack-name ccc-dev-keycloak
            aws cloudformation wait stack-delete-complete --stack-name ccc-dev-keycloak || true
          fi

      - name: Deploy Keycloak stack (CDK)
        working-directory: infra
        run: |
          npx cdk deploy ccc-dev-keycloak \
            -c stage="$STAGE" -c keycloakImageTag="$IMAGE_TAG" \
            --require-approval never

      - name: Bootstrap Keycloak realm
        env:
          KEYCLOAK_URL: https://auth.dev.cloudcorecollab.com
        run: |
          export KEYCLOAK_ADMIN_PASSWORD
          export WEBEX_IDP_CLIENT_ID
          export WEBEX_IDP_CLIENT_SECRET
          KEYCLOAK_ADMIN_PASSWORD=$(aws ssm get-parameter --name /ccc/dev/keycloak_admin_password --with-decryption --query Parameter.Value --output text)
          WEBEX_IDP_CLIENT_ID=$(aws ssm get-parameter --name /ccc/dev/keycloak_webex_idp_client_id --with-decryption --query Parameter.Value --output text)
          WEBEX_IDP_CLIENT_SECRET=$(aws ssm get-parameter --name /ccc/dev/keycloak_webex_idp_client_secret --with-decryption --query Parameter.Value --output text)
          chmod +x keycloak/setup-realm-aws.sh
          ./keycloak/setup-realm-aws.sh

      - name: Deploy webex-connector stack (CDK)
        working-directory: infra
        run: |
          npx cdk deploy ccc-dev-webex-connector \
            -c stage="$STAGE" -c webexConnectorImageTag="$IMAGE_TAG" \
            --require-approval never

      - name: Deploy app stack (CDK)
        working-directory: infra
        run: |
          npx cdk deploy ccc-dev-app \
            -c stage="$STAGE" -c imageTag="$IMAGE_TAG" -c webexConnectorImageTag="$IMAGE_TAG" \
            --require-approval never \
            --outputs-file cdk-outputs.json
          echo "DISTRIBUTION_ID=$(node -p "require('./cdk-outputs.json')['ccc-dev-app'].DistributionId")" >> "$GITHUB_ENV"
          echo "WEB_BUCKET=$(node -p "require('./cdk-outputs.json')['ccc-dev-app'].WebBucketName")" >> "$GITHUB_ENV"

      - name: Build & publish frontend
        working-directory: portal/frontend
        run: |
          npm ci
          npm run build
          aws s3 sync dist "s3://$WEB_BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths '/*'

      - name: Smoke test — API health
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://dev.cloudcorecollab.com/api/health || true)
            echo "attempt $i: /api/health -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::/api/health never returned 200 (Aurora cold-start can take ~30s; re-run if this was the first request of the day)"
          exit 1

      - name: Smoke test — Keycloak OIDC discovery
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://auth.dev.cloudcorecollab.com/realms/ccc/.well-known/openid-configuration || true)
            echo "attempt $i: Keycloak discovery -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "::warning::Keycloak discovery not yet 200 — check ccc-dev-keycloak stack and realm bootstrap"
          exit 0

      - name: Smoke test — v2 ingest (optional)
        env:
          PORTAL_URL: https://dev.cloudcorecollab.com
          CONNECTOR_TOKEN: ${{ secrets.SMOKE_CONNECTOR_TOKEN }}
        run: |
          if [ -z "$CONNECTOR_TOKEN" ]; then
            echo "SMOKE_CONNECTOR_TOKEN not set — skipping end-to-end ingest smoke."
            exit 0
          fi
          python3 scripts/smoke-v2-ingest.py
